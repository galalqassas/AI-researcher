<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auto-Researcher{% endblock %}</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f5f5; color: #333; max-width: 900px; margin: 0 auto; padding: 2rem; }
        h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1.3rem; margin: 1.5rem 0 0.75rem; }
        p.sub { color: #666; margin-bottom: 2rem; }
        .stats { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .card { background: #fff; border-radius: 8px; padding: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        .card .label { font-size: .8rem; color: #666; text-transform: uppercase; }
        .card .value { font-size: 2rem; font-weight: 700; }
        .btn { display: inline-block; padding: .6rem 1rem; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; font-size: .9rem; text-decoration: none; }
        .btn:hover { background: #1d4ed8; }
        .btn.alt { background: #6b7280; }
        .btn.alt:hover { background: #4b5563; }
        .btns { display: flex; gap: .5rem; flex-wrap: wrap; }
        .box { background: #fff; border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
        form { display: inline; }
    </style>
</head>
<body>
    <h1>{% block header %}Auto-Researcher{% endblock %}</h1>
    <p class="sub">{% block sub %}AI Research Paper Ingestion & Reporting{% endblock %}</p>
    {% block content %}{% endblock %}
</body>
</html>
