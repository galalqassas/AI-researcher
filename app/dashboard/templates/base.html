<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Auto-Researcher{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-hover: #f1f5f9;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --text: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --primary-light: #dbeafe;
            --primary-text: #1e40af;
            --success: #10b981;
            --success-light: #d1fae5;
            --success-text: #065f46;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --danger-text: #991b1b;
            --purple: #8b5cf6;
            --purple-light: #ede9fe;
            --purple-text: #5b21b6;
            --amber: #f59e0b;
            --amber-light: #fef3c7;
            --amber-text: #92400e;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
            --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,.08), 0 2px 4px -2px rgba(0,0,0,.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .navbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
            background: rgba(255,255,255,.85);
        }
        .navbar-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: .6rem;
            text-decoration: none;
            color: var(--text);
        }
        .navbar-brand .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--purple));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: .85rem;
        }
        .navbar-brand span {
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -.02em;
        }
        .navbar-links {
            display: flex;
            gap: .25rem;
        }
        .navbar-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: .85rem;
            font-weight: 500;
            padding: .4rem .75rem;
            border-radius: var(--radius-sm);
            transition: all .15s ease;
        }
        .navbar-links a:hover {
            color: var(--text);
            background: var(--surface-hover);
        }
        .navbar-links a.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .main {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem;
        }

        .page-header {
            margin-bottom: 1.75rem;
        }
        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -.02em;
            margin-bottom: .15rem;
        }
        .page-header .subtitle {
            color: var(--text-secondary);
            font-size: .9rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.75rem;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            transition: box-shadow .2s ease;
        }
        .stat-card:hover { box-shadow: var(--shadow-md); }
        .stat-card .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            margin-bottom: .75rem;
        }
        .stat-card .stat-icon.blue { background: var(--primary-light); color: var(--primary-text); }
        .stat-card .stat-icon.green { background: var(--success-light); color: var(--success-text); }
        .stat-card .stat-icon.purple { background: var(--purple-light); color: var(--purple-text); }
        .stat-card .stat-icon.amber { background: var(--amber-light); color: var(--amber-text); }
        .stat-card .stat-label {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .25rem;
        }
        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -.02em;
            color: var(--text);
        }

        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        .section h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -.01em;
        }
        .section .description {
            color: var(--text-secondary);
            font-size: .825rem;
            margin-top: .15rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
            padding: .55rem 1.1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: .85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all .15s ease;
            text-decoration: none;
            line-height: 1.4;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 1px 2px rgba(59,130,246,.3);
        }
        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 2px 4px rgba(59,130,246,.4);
        }
        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--surface-hover);
            border-color: #cbd5e1;
        }
        .btn-report {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            flex: 1;
            min-width: 140px;
        }
        .btn-report:hover {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary-text);
        }
        .btn-report .btn-period {
            display: block;
            font-weight: 600;
            font-size: .85rem;
        }
        .btn-report .btn-hint {
            display: block;
            font-weight: 400;
            font-size: .7rem;
            color: var(--text-tertiary);
            margin-top: .1rem;
        }

        form { display: inline; }

        .btn-group {
            display: flex;
            gap: .65rem;
            flex-wrap: wrap;
        }

        .flash {
            padding: .85rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.25rem;
            font-size: .875rem;
            font-weight: 500;
        }
        .flash-error { background: var(--danger-light); color: var(--danger-text); border: 1px solid #fecaca; }
        .flash-success { background: var(--success-light); color: var(--success-text); border: 1px solid #a7f3d0; }

        .report-list { display: flex; flex-direction: column; gap: .5rem; }
        .report-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .85rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--text);
            transition: all .15s ease;
        }
        .report-item:hover {
            background: var(--primary-light);
            border-color: var(--primary);
        }
        .report-item .ri-left { display: flex; align-items: center; gap: .75rem; }
        .report-item .ri-icon {
            width: 34px; height: 34px;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            font-size: .85rem;
        }
        .report-item .ri-title { font-weight: 600; font-size: .9rem; }
        .report-item .ri-meta { font-size: .78rem; color: var(--text-secondary); }
        .report-item .ri-arrow { color: var(--text-tertiary); font-size: 1.1rem; }

        .report-content h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-top: 2rem;
            margin-bottom: .5rem;
            padding-bottom: .5rem;
            border-bottom: 2px solid var(--primary-light);
        }
        .report-content h3 {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text);
            margin-top: 1.25rem;
            margin-bottom: .4rem;
        }
        .report-content p {
            color: var(--text-secondary);
            font-size: .9rem;
            line-height: 1.7;
            margin-bottom: .75rem;
        }
        .report-content ul {
            list-style: none;
            padding: 0;
            margin-bottom: 1rem;
        }
        .report-content ul li {
            padding: .45rem 0 .45rem 1.25rem;
            position: relative;
            font-size: .875rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .report-content ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: .75rem;
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }
        .report-content a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .report-content a:hover { text-decoration: underline; }
        .report-content hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 1.5rem 0;
        }
        .report-content em {
            color: var(--text-tertiary);
            font-size: .825rem;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state .empty-icon {
            font-size: 2.5rem;
            margin-bottom: .75rem;
        }
        .empty-state .empty-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: .25rem;
            color: var(--text);
        }
        .empty-state .empty-desc {
            font-size: .85rem;
            color: var(--text-tertiary);
        }

        @media (max-width: 640px) {
            .main { padding: 1.25rem; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .btn-group { flex-direction: column; }
            .btn-report { min-width: auto; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">
                <div class="logo">AR</div>
                <span>Auto-Researcher</span>
            </a>
            <div class="navbar-links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
                <a href="/reports" class="{% if '/reports' in request.path and request.path != '/' %}active{% endif %}">Reports</a>
            </div>
        </div>
    </nav>

    <div class="main">
        <div class="page-header">
            <h1>{% block header %}Auto-Researcher{% endblock %}</h1>
            <div class="subtitle">{% block sub %}AI Research Paper Ingestion & Reporting{% endblock %}</div>
        </div>

        {% if error %}
        <div class="flash flash-error">{{ error }}</div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>
